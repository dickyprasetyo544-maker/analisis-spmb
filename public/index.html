<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPMB SMPN 8 Probolinggo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* === GAYA PREMIUM & RESPONSIVE === */
        body {
            font-family: 'Poppins', sans-serif;
            /* Background dengan gradasi warna yang lebih elegan */
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
        }
        
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
        }

        .logo-img {
            width: 85px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* Penyesuaian border-radius untuk input-group (password) */
        .input-group > .form-control {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
        }

        .input-group > .btn {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border: 1px solid #e2e8f0;
            border-left: none;
            background-color: #f8fafc;
            color: #64748b;
            transition: all 0.3s;
        }

        .form-control:focus + .btn {
            border-color: #3b82f6;
            background-color: #ffffff;
        }

        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3);
        }

        .form-label {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                
                <div class="card login-card p-2 p-md-3">
                    <div class="card-body text-center">
                        
                        <img src="logo.png" alt="Logo SMPN 8" class="logo-img">
                        
                        <h4 class="fw-bold text-dark mb-1">Simulasi SPMB</h4>
                        <p class="text-muted small mb-4 pb-2">SMP Negeri 8 Probolinggo</p>

                        <form id="loginForm">
                            <div class="mb-4 text-start">
                                <label for="username" class="form-label fw-semibold">Username / Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 rounded-start-3 text-muted">
                                        <i class="bi bi-person"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Masukkan username admin" required>
                                </div>
                            </div>
                            
                            <div class="mb-4 pb-2 text-start">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 rounded-start-3 text-muted">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Masukkan password" required>
                                    <button class="btn" type="button" id="togglePassword">
                                        <i class="bi bi-eye" id="eyeIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-login w-100 fw-bold text-white mb-4">
                                Masuk Dashboard <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                            
                            <div class="text-center border-top pt-4 mt-2">
                                <span class="text-muted small d-block mb-1">Belum punya akses?</span>
                                <a href="register.html" class="text-decoration-none fw-bold text-primary small d-inline-block transition-transform" id="btnAjukanAkun" style="transition: 0.2s;">
                                    Ajukan Pembuatan Akun
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted opacity-75">Created by <strong class="fw-semibold">dhickz666</strong></small>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        // --- 1. SCRIPT UNTUK TOGGLE MATA (LIHAT PASSWORD) ---
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            // Ubah tipe input dari password ke text atau sebaliknya
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Ubah icon mata
            if (type === 'password') {
                eyeIcon.classList.remove('bi-eye-slash');
                eyeIcon.classList.add('bi-eye');
            } else {
                eyeIcon.classList.remove('bi-eye');
                eyeIcon.classList.add('bi-eye-slash');
            }
        });

        // --- 2. SCRIPT MENGIRIM DATA LOGIN KE SERVER ---
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault(); // Mencegah halaman me-refresh otomatis

            // Ambil isi inputan
            const usernameValue = document.getElementById('username').value;
            const passwordValue = document.getElementById('password').value;

            // Efek loading pada tombol (opsional UX)
            const btnSubmit = document.querySelector('.btn-login');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Memproses...';
            btnSubmit.disabled = true;

            try {
                // --- INI YANG DIUBAH (NEMBAK LANGSUNG KE JALUR ASLI NETLIFY) ---
                const response = await fetch('/.netlify/functions/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameValue, password: passwordValue })
                });

                const result = await response.json();

                // Cek balasannya dari server
                if (result.success) {
                    // Simpan nama dan role di memori browser (Local Storage)
                    localStorage.setItem('userName', result.nama);
                    localStorage.setItem('userRole', result.role);
                    
                    // Pindah ke halaman dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Gagal: " + result.message);
                    btnSubmit.innerHTML = originalText;
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Terjadi kesalahan saat menghubungi server. Pastikan server berjalan.");
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
