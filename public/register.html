<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Akun - SPMB SMPN 8 Probolinggo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Background gradien premium */
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }
        .card-premium {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1);
            border-color: #198754;
        }
        .btn-success {
            border-radius: 12px;
            padding: 14px;
            background: linear-gradient(135deg, #198754 0%, #146c43 100%);
            border: none;
            letter-spacing: 0.5px;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #146c43 0%, #0f5132 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(25, 135, 84, 0.2);
            transition: all 0.3s ease;
        }
        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            border-radius: 50%;
            padding: 4px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3 p-md-0">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="card card-premium border-0">
                    <div class="card-body p-4 p-sm-5 text-center">
                        
                        <div class="logo-wrapper">
                            <img src="logo.png" alt="Logo SMPN 8" class="img-fluid rounded-circle" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        
                        <h4 class="fw-bold text-success mb-1">Pengajuan Akun</h4>
                        <p class="text-muted mb-4 small">SMP Negeri 8 Probolinggo</p>

                        <form id="registerForm">
                            <div class="mb-3 text-start">
                                <label for="namaLengkap" class="form-label fw-semibold text-dark small">Nama Lengkap</label>
                                <input type="text" class="form-control" id="namaLengkap" placeholder="Contoh: Budi Santoso, S.Pd" required>
                            </div>
                            
                            <div class="mb-3 text-start">
                                <label for="newUsername" class="form-label fw-semibold text-dark small">Username Baru</label>
                                <input type="text" class="form-control" id="newUsername" placeholder="Buat username untuk login" required>
                            </div>
                            
                            <div class="mb-4 text-start">
                                <label for="newPassword" class="form-label fw-semibold text-dark small">Password</label>
                                <input type="password" class="form-control" id="newPassword" placeholder="Buat password" required>
                                <div class="form-text small text-muted mt-2">
                                    <span class="text-success fw-medium">Akun didaftarkan sebagai Guru.</span> Menunggu persetujuan admin.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 fw-bold mb-4">Kirim Pengajuan</button>
                            
                            <div class="text-center mt-2">
                                <span class="text-muted small">Sudah punya akses?</span>
                                <a href="index.html" class="text-decoration-none text-success fw-bold small ms-1">Kembali Login</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 

            // Ubah teks tombol saat loading
            const submitBtn = registerForm.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Memproses...';
            submitBtn.disabled = true;

            const namaValue = document.getElementById('namaLengkap').value;
            const usernameValue = document.getElementById('newUsername').value;
            const passwordValue = document.getElementById('newPassword').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        namaLengkap: namaValue, 
                        username: usernameValue, 
                        password: passwordValue,
                        role: "Guru" // <-- Penambahan otomatis role sebagai Guru
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert("Berhasil! " + result.message);
                    window.location.href = 'index.html'; // Kembali ke halaman login
                } else {
                    alert("Gagal: " + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Gagal menghubungi server. Pastikan koneksi internet stabil.");
            } finally {
                // Kembalikan tombol seperti semula jika gagal
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
