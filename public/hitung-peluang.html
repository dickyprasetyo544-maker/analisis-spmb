<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Peluang - SMPN 8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        
        /* Sidebar Styling */
        #wrapper { display: flex; width: 100%; align-items: stretch; }
        #sidebar-wrapper {
            min-width: 280px; max-width: 280px; min-height: 100vh;
            background: #0d6efd; transition: all 0.3s;
        }
        .sidebar-link {
            padding: 12px 25px; display: block; color: rgba(255,255,255,0.8);
            text-decoration: none; transition: 0.3s; margin: 5px 15px; border-radius: 10px;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255,255,255,0.2); color: white; font-weight: 600;
        }

        /* Card Styling */
        .card-premium { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-hitung {
            padding: 15px; border-radius: 15px; font-weight: 700;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-hitung:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3); }

        /* Result Section */
        #hasilAnalisis { display: none; }
        .score-circle {
            width: 150px; height: 150px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0 auto; border: 8px solid #eee;
        }
        .badge-peluang { padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="wrapper">
    <div class="text-white shadow-lg" id="sidebar-wrapper">
        <div class="p-4 fw-bold fs-5 border-bottom border-white border-opacity-25 text-center">
            🎓 SPMB SISWA
        </div>
        <div class="mt-4">
            <a href="dashboard-siswa.html" class="sidebar-link"><i class="bi bi-grid-fill me-2"></i> Beranda</a>
            <a href="hitung-peluang.html" class="sidebar-link active"><i class="bi bi-calculator-fill me-2"></i> Hitung Peluang</a>
            <div style="margin-top: 100px;">
                <a href="#" onclick="logout()" class="sidebar-link text-warning"><i class="bi bi-power me-2"></i> Keluar</a>
            </div>
        </div>
    </div>

    <div class="w-100">
        <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3">
            <h5 class="mb-0 fw-bold text-primary">Simulasi Peluang Lanjut Sekolah</h5>
        </nav>

        <div class="container-fluid p-4 p-md-5">
            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card card-premium p-4 p-md-5">
                        <h4 class="fw-bold mb-4 text-dark">Data Nilai Kamu</h4>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Rata-rata Rapor (Smt 1-5)</label>
                            <input type="number" id="rapor" class="form-control form-control-lg border-light bg-light" placeholder="0.00">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Rata-rata Nilai TKA</label>
                            <input type="number" id="tka" class="form-control form-control-lg border-light bg-light" placeholder="0.00">
                        </div>

                        <hr class="my-4 opacity-50">

                        <h4 class="fw-bold mb-3 text-dark">Sekolah Tujuan</h4>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Pilih Jenjang</label>
                            <div class="d-flex gap-2">
                                <input type="radio" class="btn-check" name="jenjang" id="sma" value="SMA" checked onchange="loadSekolah()">
                                <label class="btn btn-outline-primary w-100 fw-bold" for="sma">SMA</label>
                                
                                <input type="radio" class="btn-check" name="jenjang" id="smk" value="SMK" onchange="loadSekolah()">
                                <label class="btn btn-outline-primary w-100 fw-bold" for="smk">SMK</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">Nama Sekolah</label>
                            <select id="selectSekolah" class="form-select form-select-lg border-light bg-light">
                                <option value="">-- Memuat Data Sekolah... --</option>
                            </select>
                        </div>

                        <button onclick="hitungNKA()" class="btn btn-primary btn-hitung w-100 shadow">
                            ANALISIS SEKARANG <i class="bi bi-arrow-right-circle-fill ms-2"></i>
                        </button>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div id="placeholderHasil" class="h-100 d-flex flex-column align-items-center justify-content-center text-center p-5 bg-white rounded-5 border-dashed border-2">
                        <i class="bi bi-clipboard2-pulse text-muted opacity-25" style="font-size: 5rem;"></i>
                        <h5 class="text-muted mt-3">Hasil analisis akan muncul di sini <br>setelah kamu mengisi data.</h5>
                    </div>

                    <div id="hasilAnalisis" class="card card-premium p-5 text-center">
                        <h5 class="text-muted fw-bold mb-4 uppercase tracking-wider">HASIL ANALISIS AKADEMIK</h5>
                        
                        <div class="score-circle mb-3" id="lingkaranSkor">
                            <small class="text-muted fw-bold">SKOR NKA</small>
                            <h1 class="display-4 fw-bold mb-0 text-primary" id="resNKA">00.0</h1>
                        </div>

                        <div class="my-4">
                            <h3 class="fw-bold text-dark" id="resSekolah">-</h3>
                            <p class="text-muted">Passing Grade: <span id="resPG" class="fw-bold">00.00</span></p>
                        </div>

                        <div id="boxPeluang" class="p-4 rounded-4 bg-light">
                            <p class="mb-2 text-muted fw-bold uppercase">Peluang Diterima:</p>
                            <span id="labelPeluang" class="badge-peluang">-</span>
                            <p class="mt-3 mb-0 text-dark italic" id="pesanSaran"></p>
                        </div>
                        
                        <button class="btn btn-link text-muted mt-4 text-decoration-none" onclick="window.print()">
                            <i class="bi bi-printer me-1"></i> Cetak Hasil Simulasi
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let masterDataPG = [];

    // 1. Ambil data dari API passing-grade milikmu
    async function loadSekolah() {
        const select = document.getElementById('selectSekolah');
        const jenjangDipilih = document.querySelector('input[name="jenjang"]:checked').value;
        
        select.innerHTML = '<option value="">-- Memuat... --</option>';

        try {
            // Memanggil endpoint dari api.js kamu di Netlify
            const response = await fetch('/.netlify/functions/api/passing-grade');
            const result = await response.json();

            if (result.success) {
                masterDataPG = result.data;
                
                // Filter berdasarkan SMA/SMK
                const filtered = masterDataPG.filter(item => item.jenjang === jenjangDipilih);
                
                select.innerHTML = '<option value="">-- Pilih Sekolah Tujuan --</option>';
                filtered.forEach(item => {
                    const namaFull = item.jurusan !== 'Umum' ? `${item.nama_sekolah} - ${item.jurusan}` : item.nama_sekolah;
                    select.innerHTML += `<option value="${item.passing_grade}" data-nama="${namaFull}">${namaFull}</option>`;
                });
            }
        } catch (error) {
            console.error("Gagal ambil data PG:", error);
            select.innerHTML = '<option value="">Gagal memuat data</option>';
        }
    }

    // 2. Logika Hitung NKA (60% Rapor + 40% TKA)
    function hitungNKA() {
        const nr = parseFloat(document.getElementById('rapor').value) || 0;
        const nt = parseFloat(document.getElementById('tka').value) || 0;
        const select = document.getElementById('selectSekolah');
        const pg = parseFloat(select.value) || 0;
        const namaSekolah = select.options[select.selectedIndex].getAttribute('data-nama');

        if (nr === 0 || nt === 0 || pg === 0) {
            alert("Harap isi nilai dan pilih sekolah tujuan!");
            return;
        }

        // Rumus NKA
        const nka = (nr * 0.6) + (nt * 0.4);

        // Update UI
        document.getElementById('placeholderHasil').classList.add('d-none');
        document.getElementById('hasilAnalisis').style.display = 'block';
        document.getElementById('resNKA').innerText = nka.toFixed(2);
        document.getElementById('resSekolah').innerText = namaSekolah;
        document.getElementById('resPG').innerText = pg.toFixed(2);

        // Analisis Peluang
        const label = document.getElementById('labelPeluang');
        const saran = document.getElementById('pesanSaran');
        const lingkaran = document.getElementById('lingkaranSkor');

        if (nka >= pg) {
            label.innerText = "PELUANG TINGGI";
            label.className = "badge-peluang bg-success text-white";
            saran.innerText = "Selamat! Nilai kamu berada di atas Passing Grade. Peluang kamu untuk lolos sangat besar.";
            lingkaran.style.borderColor = "#198754";
        } else if (nka >= (pg - 2)) {
            label.innerText = "PELUANG SEDANG";
            label.className = "badge-peluang bg-warning text-dark";
            saran.innerText = "Nilai kamu mendekati Passing Grade. Masih ada peluang, namun disarankan tetap mencari cadangan sekolah lain.";
            lingkaran.style.borderColor = "#ffc107";
        } else {
            label.innerText = "PELUANG RENDAH";
            label.className = "badge-peluang bg-danger text-white";
            saran.innerText = "Maaf, nilai kamu cukup jauh dari Passing Grade tahun lalu. Disarankan untuk memilih sekolah dengan PG yang lebih rendah.";
            lingkaran.style.borderColor = "#dc3545";
        }
    }

    function logout() {
        if(confirm('Apakah anda yakin ingin keluar?')) {
            window.location.href = 'index.html';
        }
    }

    // Jalankan load data saat halaman siap
    window.onload = loadSekolah;
</script>

</body>
</html>
